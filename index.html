<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f4f0;
        }

        #logo {
            max-width: 80%;
            max-height: 80%;
            transition: opacity 1s ease, transform 1s ease;
        }

        .fadeOut {
            opacity: 0;
            transform: scale(0.7);
        }

        #loginPortal {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px;
            background-color: #d4edda; /* pastel green */
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .loginBtn {
            width: 260px;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #155724; /* dark green */
            background-color: #c3e6cb; /* lighter pastel green */
            border: 2px solid #155724;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
        }

        .loginBtn:hover {
            transform: scale(1.05);
            background-color: #b2dfbb;
        }
    </style>
</head>
<body>

    <img id="logo" src="https://your-logo-image.png" alt="Logo">

    <div id="loginPortal">
        <div class="loginBtn">Administrators</div>
        <div class="loginBtn">Recruiters</div>
        <div class="loginBtn">Candidates</div>
    </div>

    <script>
        setTimeout(() => {
            const logoEl = document.getElementById('logo');
            logoEl.classList.add('fadeOut');

            logoEl.addEventListener('transitionend', () => {
                logoEl.style.display = 'none';
                document.getElementById('loginPortal').style.display = 'flex';
            });
        }, 2000);
    </script>

</body>
</html>
