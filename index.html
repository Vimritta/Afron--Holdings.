<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Portal with Voice Greetings</title>

<style>
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f2fff2;
    font-family: Arial, sans-serif;
}

/* Login area */
#loginPortal {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    padding: 40px;
    background-color: #d4edda;   /* pastel green */
    border-radius: 18px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
}

/* Buttons */
.loginBtn {
    width: 260px;
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #155724;          /* dark green */
    background-color: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}
.loginBtn:hover {
    transform: scale(1.07);
    background-color: #b2dfbb;
}

/* Greeting box */
#greeting {
    font-size: 22px;
    font-weight: bold;
    color: #155724;
    margin-top: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.7s;
    min-height: 60px;
    text-align: center;
}
#greeting.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- LOGIN PORTAL -->
<div id="loginPortal">
    <div class="loginBtn" data-role="Administrator">Administrators</div>
    <div class="loginBtn" data-role="Recruiter">Recruiters</div>
    <div class="loginBtn" data-role="Candidate">Candidates</div>
    <div id="greeting"></div>
</div>

<script>
// Greeting messages
const greetings = {
    Administrator: "Welcome, mighty Administrator! 🌟 Full system access granted.",
    Recruiter: "Hello Recruiter! 🤝 Let's find great talent today.",
    Candidate: "Hi Candidate! 🎯 Your future begins here — good luck!"
};

const buttons = document.querySelectorAll('.loginBtn');
const greetingBox = document.getElementById('greeting');

// Add click events
buttons.forEach(btn => {
    btn.addEventListener('click', () => {
        const role = btn.dataset.role;
        const message = greetings[role];

        // Show greeting text
        greetingBox.classList.remove("show");
        setTimeout(() => {
            greetingBox.textContent = message;
            greetingBox.classList.add("show");
        }, 50);

        // Speak aloud
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const speak = new SpeechSynthesisUtterance(message);
            speak.lang = "en-US";
            speak.pitch = 1;
            speak.rate = 1;
            window.speechSynthesis.speak(speak);
        }
    });
});
</script>

</body>
</html>
