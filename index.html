<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Login System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2fff2;
    height: 100vh;
    overflow: hidden;
}

/* Center containers */
.centerBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    background-color: #d4edda;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    width: 300px;
    margin: auto;
}

/* Fix for login page so password field works */
#loginPage.centerBox {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
}

/* Role buttons */
.roleBtn {
    width: 260px;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    color: #155724;
    background-color: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}
.roleBtn:hover {
    transform: scale(1.07);
    background-color: #b2dfbb;
}

/* Login input fields */
input {
    width: 240px;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: 2px solid #155724;
}

/* Next button */
#nextBtn {
    width: 120px;
    padding: 14px;
    background-color: #4CAF50;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
#nextBtn:hover {
    background-color: #449d48;
}

/* Full-screen greeting background */
#greetingMessage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('https://images.pexels.com/photos/373543/pexels-photo-373543.jpeg') no-repeat center center;
    background-size: cover;
    opacity: 0;
    transition: 1s ease;
    z-index: 100;
}
#greetingMessage.show {
    opacity: 1;
}
</style>
</head>
<body>

<!-- ROLE SELECTION -->
<div id="roleSelection" class="centerBox">
    <div class="roleBtn" data-role="Administrator">Administrators</div>
    <div class="roleBtn" data-role="Recruiter">Recruiters</div>
    <div class="roleBtn" data-role="Candidate">Candidates</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="centerBox" style="display:none;">
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button id="nextBtn">Next →</button>
</div>

<!-- GREETING -->
<div id="greetingMessage"></div>

<script>
// Greetings with emoji
const greetingText = {
    Administrator: "Welcome, mighty Administrator! You have full control over the system. Manage your team wisely. 🌟",
    Recruiter: "Hello Recruiter! Ready to find the perfect candidates? Let’s make great hires today! 🤝",
    Candidate: "Hi Candidate! Your dream job awaits. Explore opportunities and shine! 🎯"
};

let selectedRole = "";

// STEP 1: Role selection
document.querySelectorAll(".roleBtn").forEach(btn => {
    btn.addEventListener("click", () => {
        selectedRole = btn.dataset.role;
        document.getElementById("roleSelection").style.display = "none";
        document.getElementById("loginPage").style.display = "flex";
    });
});

// STEP 2: Login → show full-screen greeting
document.getElementById("nextBtn").addEventListener("click", () => {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (username === "" || password === "") {
        alert("Please enter both username and password.");
        return;
    }

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("roleSelection").style.display = "none";

    const greetingBox = document.getElementById("greetingMessage");
    greetingBox.textContent = greetingText[selectedRole];
    greetingBox.classList.add("show");

    // Speech synthesis
    const speak = new SpeechSynthesisUtterance(greetingText[selectedRole]);
    speak.rate = 1;
    speak.pitch = 1;
    speak.lang = "en-US";
    window.speechSynthesis.speak(speak);
});
</script>

</body>
</html>
