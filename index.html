<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Login System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2fff2;
    overflow: hidden;
}

/* Center containers */
.centerBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    background-color: #d4edda;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    width: 300px;
    margin: 120px auto;
}

/* Role buttons */
.roleBtn {
    width: 260px;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    color: #155724;
    background-color: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}
.roleBtn:hover {
    transform: scale(1.07);
    background-color: #b2dfbb;
}

/* Login input fields */
input {
    width: 240px;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: 2px solid #155724;
}

/* Next button */
#nextBtn {
    width: 120px;
    padding: 14px;
    background-color: #4CAF50;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
#nextBtn:hover {
    background-color: #449d48;
}

/* Greeting top-right corner */
#greetingMessage {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #155724;
    opacity: 0;
    transform: translateY(-20px);
    transition: 1s ease;
}
#greetingMessage.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- ROLE SELECTION -->
<div id="roleSelection" class="centerBox">
    <div class="roleBtn" data-role="Administrator">Administrators</div>
    <div class="roleBtn" data-role="Recruiter">Recruiters</div>
    <div class="roleBtn" data-role="Candidate">Candidates</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="centerBox" style="display:none;">
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button id="nextBtn">Next →</button>
</div>

<!-- GREETING -->
<div id="greetingMessage"></div>

<script>

// Unique greetings
const greetingText = {
    Administrator: name => `🌟 Welcome back, ${name} — our respected Administrator!`,
    Recruiter: name => `🤝 Greetings ${name}! Ready to discover great talent today.`,
    Candidate: name => `🎯 Hello ${name}! Your journey to success starts here.`
};

let selectedRole = "";

// Role click → show login page
document.querySelectorAll(".roleBtn").forEach(btn => {
    btn.addEventListener("click", () => {
        selectedRole = btn.dataset.role;

        document.getElementById("roleSelection").style.display = "none";
        document.getElementById("loginPage").style.display = "flex";
    });
});

// Next → Show greeting page
document.getElementById("nextBtn").addEventListener("click", () => {
    const username = document.getElementById("username").value.trim();

    if (username === "") {
        alert("Please enter username.");
        return;
    }

    // Hide login page → Blank screen
    document.getElementById("loginPage").style.display = "none";
    document.body.style.backgroundColor = "white";

    // Greeting message
    const greetMsg = greetingText[selectedRole](username);
    const greetingBox = document.getElementById("greetingMessage");

    greetingBox.textContent = greetMsg;
    greetingBox.classList.add("show");

    // Speak greeting
    const speak = new SpeechSynthesisUtterance(greetMsg);
    speak.rate = 1;
    speak.pitch = 1;
    speak.lang = "en-US";
    window.speechSynthesis.speak(speak);
});
</script>
</body>
</html>
