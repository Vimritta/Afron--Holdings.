<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Login System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2fff2;
    height: 100vh;
    overflow: hidden;
}

/* Center containers */
.centerBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    background-color: #d4edda;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    width: 300px;
    margin: auto;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Role buttons */
.roleBtn {
    width: 260px;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    color: #155724;
    background-color: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}
.roleBtn:hover {
    transform: scale(1.07);
    background-color: #b2dfbb;
}

/* Login input fields */
input {
    width: 240px;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: 2px solid #155724;
}

/* Next button */
#nextBtn {
    width: 120px;
    padding: 14px;
    background-color: #4CAF50;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
#nextBtn:hover {
    background-color: #449d48;
}

/* Greeting center screen */
#greetingMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    font-size: 26px;
    font-weight: bold;
    color: #155724;
    background: #e9ffe9;
    padding: 30px 50px;
    border-radius: 15px;
    text-align: center;
    width: 80%;
    opacity: 0;
    transition: 0.8s ease;
}
#greetingMessage.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}
</style>
</head>
<body>

<!-- ROLE SELECTION -->
<div id="roleSelection" class="centerBox">
    <div class="roleBtn" data-role="Administrators">Administrators</div>
    <div class="roleBtn" data-role="Recruiters">Recruiters</div>
    <div class="roleBtn" data-role="Candidates">Candidates</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="centerBox" style="display:none;">
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button id="nextBtn">Next →</button>
</div>

<!-- GREETING -->
<div id="greetingMessage"></div>

<script>
// EXACT GREETINGS (emoji at END)
const greetingText = {
    Administrators: "Welcome, mighty Administrator! You have full control over the system. Manage your team wisely. 🌟",
    Recruiters: "Hello Recruiter! Ready to find the perfect candidates? Let’s make great hires today! 🤝",
    Candidates: "Hi Candidate! Your dream job awaits. Explore opportunities and shine! 🎯"
};

let selectedRole = "";

// STEP 1: User selects role → show login page
document.querySelectorAll(".roleBtn").forEach(btn => {
    btn.addEventListener("click", () => {
        selectedRole = btn.dataset.role;

        document.getElementById("roleSelection").style.display = "none";
        document.getElementById("loginPage").style.display = "flex";
    });
});

// STEP 2: After login → show greeting
document.getElementById("nextBtn").addEventListener("click", () => {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (username === "" || password === "") {
        alert("Please enter both username and password.");
        return;
    }

    // Hide login page → white background
    document.getElementById("loginPage").style.display = "none";
    document.body.style.backgroundColor = "white";

    // Show greeting in center
    const greeting = greetingText[selectedRole];
    const greetingBox = document.getElementById("greetingMessage");

    greetingBox.textContent = greeting;
    greetingBox.classList.add("show");

    // Speak greeting aloud
    const speak = new SpeechSynthesisUtterance(greeting);
    speak.rate = 1;
    speak.pitch = 1;
    speak.lang = "en-US";
    window.speechSynthesis.speak(speak);
});
</script>

</body>
</html>
