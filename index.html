<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Login System</title>

<style>
/* (KEEP YOUR EXISTING STYLES — unchanged) */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2fff2;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.centerBox {
    background-color: #d4edda;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    width: 320px;
    text-align: center;
}

.roleBtn {
    margin: 12px 0;
    padding: 15px;
    font-size: 22px;
    background: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    cursor: pointer;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #155724;
    margin-bottom: 15px;
}

button {
    padding: 12px 25px;
    background: green;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* GREETING */
#greetingMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 80%;
    transform: translate(-50%, -50%);
    opacity: 0;
    background: white;
    padding: 30px;
    border-radius: 15px;
}
#greetingMessage.show { opacity: 1; }

/* ================= ADMIN DASHBOARD ================= */
#adminDashboard {
    display: none;
    width: 95%;
    max-width: 1100px;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

/* Overview Cards */
.cardContainer {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
}

.card {
    background: #e9f7ef;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

/* Charts */
.chartBar {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}
.bar {
    width: 40px;
    background: green;
}

/* Pie */
.pie {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: conic-gradient(green 70%, lightgray 30%);
    margin-top: 20px;
}

/* Tables */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}
td, th {
    border: 1px solid #ccc;
    padding: 8px;
}

/* NAV */
.navButtons {
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- ROLE -->
<div id="roleSelection" class="centerBox">
    <h2>Select Role</h2>
    <div class="roleBtn" data-role="Administrator">Admin</div>
    <div class="roleBtn" data-role="Recruiter">Recruiter</div>
    <div class="roleBtn" data-role="Candidate">Candidate</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="centerBox" style="display:none;">
    <h2 id="roleTitle"></h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="validateLogin()">Login</button>
</div>

<!-- GREETING -->
<div id="greetingMessage"></div>

<!-- ================= ADMIN DASHBOARD ================= -->
<div id="adminDashboard">

<h2>Admin Dashboard</h2>

<!-- Overview -->
<div class="cardContainer">
    <div class="card">Candidates: 120</div>
    <div class="card">Recruiters: 12</div>
    <div class="card">Departments: 5</div>
    <div class="card">Ongoing Hiring: 8</div>
    <div class="card">Pending Approvals: 14</div>
</div>

<!-- Charts -->
<h3>Analytics</h3>
<div class="chartBar">
    <div class="bar" style="height:100px;"></div>
    <div class="bar" style="height:60px;"></div>
    <div class="bar" style="height:80px;"></div>
</div>

<div class="pie"></div>

<!-- Recruiter Management -->
<h3>Manage Recruiters</h3>
<table>
<tr><th>Name</th><th>Action</th></tr>
<tr><td>John</td><td>
<button>Remove</button>
<button>Reset Password</button>
</td></tr>
</table>

<button>Add Recruiter</button>

<!-- Candidate Management -->
<h3>Manage Candidates</h3>
<table>
<tr><th>Name</th><th>Status</th><th>Action</th></tr>
<tr><td>Alice</td><td>Active</td><td>
<button>Suspend</button>
<button>Approve</button>
</td></tr>
</table>

<!-- NAV -->
<div class="navButtons">
    <button onclick="goBack()">⬅ Back</button>
</div>

</div>

<script>
const credentials = {
    Administrator: { user: "@admin", pass: "@admin9090" },
    Recruiter: { user: "@Re", pass: "@Re9090" },
    Candidate: { user: "@Ca", pass: "@Ca9090" }
};

const greetings = {
    Administrator: "Welcome Admin! 🌟",
    Recruiter: "Welcome Recruiter! 🤝",
    Candidate: "Welcome Candidate! 🎯"
};

let selectedRole = "";

/* ROLE SELECT */
document.querySelectorAll(".roleBtn").forEach(btn=>{
    btn.onclick=()=>{
        selectedRole = btn.dataset.role;
        document.getElementById("roleSelection").style.display="none";
        document.getElementById("loginPage").style.display="block";
        document.getElementById("roleTitle").innerText=selectedRole;
    }
});

/* LOGIN */
function validateLogin(){
    let u=username.value.trim();
    let p=password.value.trim();

    if(u===credentials[selectedRole].user && p===credentials[selectedRole].pass){
        showGreeting();
    } else alert("Invalid login");
}

/* GREETING */
function showGreeting(){
    loginPage.style.display="none";
    greetingMessage.innerText=greetings[selectedRole];
    greetingMessage.classList.add("show");

    setTimeout(()=>{
        greetingMessage.style.display="none";

        if(selectedRole==="Administrator"){
            adminDashboard.style.display="block";
            document.body.style.display="block";
        }
        else{
            roleSelection.style.display="block";
        }

    },2000);
}

/* BACK */
function goBack(){
    adminDashboard.style.display="none";
    roleSelection.style.display="block";
    document.body.style.display="flex";
}
</script>

</body>
</html>
