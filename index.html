<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Login System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2fff2;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Page containers */
.centerBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    background-color: #d4edda;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    width: 300px;
    text-align: center;
}

/* Role buttons */
.roleBtn {
    width: 260px;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    color: #155724;
    background-color: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}
.roleBtn:hover {
    transform: scale(1.07);
    background-color: #b2dfbb;
}

/* Inputs */
input {
    width: 240px;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: 2px solid #155724;
}

/* Next button */
#nextBtn {
    width: 120px;
    padding: 14px;
    background-color: #4CAF50;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
#nextBtn:hover {
    background-color: #449d48;
}

/* Greeting message */
#greetingMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    font-size: 26px;
    font-weight: bold;
    color: #155724;
    background: #e9ffe9;
    padding: 30px 50px;
    border-radius: 15px;
    width: 80%;
    text-align: center;
    opacity: 0;
    transition: 0.8s ease;
}
#greetingMessage.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<!-- ROLE SELECTION -->
<div id="roleSelection" class="centerBox">
    <div class="roleBtn" data-role="Administrator">Administrators</div>
    <div class="roleBtn" data-role="Recruiter">Recruiters</div>
    <div class="roleBtn" data-role="Candidate">Candidates</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="centerBox" style="display:none;">
    <h3 id="loginTitle"></h3>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button id="nextBtn">Login →</button>
</div>

<!-- GREETING -->
<div id="greetingMessage"></div>

<script>

// Greeting messages with emojis
const greetingText = {
    Administrator: "Welcome, mighty Administrator! You have full control over the system. 🌟",
    Recruiter: "Hello Recruiter! Ready to find the perfect candidates today? 🤝",
    Candidate: "Hi Candidate! Your dream job is waiting for you. 🎯"
};

// LOGIN CREDENTIALS
const loginCredentials = {
    Administrator: { user: "@admin", pass: "@admin9090" },
    Recruiter: { user: "@RE", pass: "@RE9090" },
    Candidate: { user: "@CA", pass: "@CA9090" }
};

let selectedRole = "";

// STEP 1 — Role Selection
document.querySelectorAll(".roleBtn").forEach(btn => {
    btn.addEventListener("click", () => {
        selectedRole = btn.dataset.role;

        document.getElementById("roleSelection").style.display = "none";
        document.getElementById("loginTitle").textContent = selectedRole + " Login";
        document.getElementById("loginPage").style.display = "flex";
    });
});

// STEP 2 — Validate Login
document.getElementById("nextBtn").addEventListener("click", () => {
    const enteredUser = document.getElementById("username").value.trim();
    const enteredPass = document.getElementById("password").value.trim();

    const correctUser = loginCredentials[selectedRole].user;
    const correctPass = loginCredentials[selectedRole].pass;

    // CHECK
    if (enteredUser !== correctUser || enteredPass !== correctPass) {
        alert("Incorrect username or password for " + selectedRole);
        return;
    }

    // Hide login box
    document.getElementById("loginPage").style.display = "none";
    document.body.style.backgroundColor = "white";

    // Show greeting
    const greetingBox = document.getElementById("greetingMessage");
    greetingBox.textContent = greetingText[selectedRole];
    greetingBox.classList.add("show");

    // SPEAK the greeting
    const speak = new SpeechSynthesisUtterance(greetingText[selectedRole]);
    window.speechSynthesis.speak(speak);
});

</script>

</body>
</html>
