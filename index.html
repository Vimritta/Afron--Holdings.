<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Login System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2fff2;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN BOX */
.centerBox {
    background-color: #d4edda;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    width: 320px;
    text-align: center;
}

.roleBtn {
    margin: 12px 0;
    padding: 15px;
    font-size: 22px;
    background: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    cursor: pointer;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #155724;
    margin-bottom: 15px;
}

button {
    padding: 12px 25px;
    background: green;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* GREETING */
#greetingMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 60%;
    transform: translate(-50%, -50%) scale(0.8);
    opacity: 0;
    background: white;
    padding: 50px;
    border-radius: 20px;
    font-size: 32px;
    text-align: center;
    transition: 0.5s;
    z-index: 2000;
}
#greetingMessage.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 230px;
    height: 100%;
    background: #155724;
    padding-top: 20px;
    display: none;
}

.sidebar button {
    width: 100%;
    padding: 15px;
    border: none;
    font-size: 16px;
    background: none;
    color: white;
    text-align: left;
    cursor: pointer;
}

.sidebar button:hover {
    background: #28a745;
}

/* DASHBOARD */
#adminDashboard {
    display: none;
    width: 100%;
}

.content {
    margin-left: 230px;
    width: calc(100% - 230px);
    display: flex;
    justify-content: center;
}

.contentInner {
    max-width: 900px;
    width: 100%;
    padding: 20px;
}

/* CARDS */
.cardContainer {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #e9f7ef;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

/* CHARTS */
.chartBar {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: center;
}
.bar {
    width: 40px;
    background: green;
}

/* PIE */
.pie {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: conic-gradient(green 70%, lightgray 30%);
    margin: 20px auto;
}

/* SCATTER CHART */
#scatterChart {
    width: 300px;
    height: 220px;
    background: white;
    border: 2px solid #155724;
    margin: 15px auto;
    position: relative;
}

.dot {
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    position: absolute;
}

.line {
    position: absolute;
    height: 2px;
    background: blue;
    transform-origin: left center;
}
</style>
</head>

<body>

<!-- ROLE -->
<div id="roleSelection" class="centerBox">
    <h2>Select Role</h2>
    <div class="roleBtn" data-role="Administrator">Admin</div>
    <div class="roleBtn" data-role="Recruiter">Recruiter</div>
    <div class="roleBtn" data-role="Candidate">Candidate</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="centerBox" style="display:none;">
    <h2 id="roleTitle"></h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="validateLogin()">Login</button>
</div>

<!-- GREETING -->
<div id="greetingMessage"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <button onclick="showSection('overview')">Dashboard Overview</button>
    <button onclick="showSection('users')">User Management</button>
    <button onclick="showSection('jobs')">Job Posting</button>
    <button onclick="showSection('interviews')">Interviews</button>
    <button onclick="showSection('messages')">Messaging</button>
    <button onclick="showSection('performance')">Performance</button>
    <button onclick="goBack()">⬅ Back</button>
</div>

<!-- DASHBOARD -->
<div id="adminDashboard" class="content">
<div class="contentInner">

<!-- OVERVIEW -->
<div id="overviewSection">
    <h2 style="text-align:center;">Admin Dashboard</h2>

    <div class="cardContainer">
        <div class="card">Candidates: 120</div>
        <div class="card">Recruiters: 12</div>
        <div class="card">Departments: 5</div>
        <div class="card">Hiring: 8</div>
        <div class="card">Pending: 14</div>
    </div>

    <h3 style="text-align:center; margin-top:30px;">Analytics Overview</h3>

    <!-- BAR CHART -->
    <h4 style="text-align:center;">📊 Monthly Registrations</h4>
    <div class="chartBar">
        <div class="bar" style="height:100px;"></div>
        <div class="bar" style="height:60px;"></div>
        <div class="bar" style="height:80px;"></div>
    </div>

    <!-- PIE CHART -->
    <h4 style="text-align:center;">🟢 Status Distribution</h4>
    <div class="pie"></div>

    <!-- SCATTER CHART -->
    <h4 style="text-align:center;">🔵 Performance Trend</h4>
    <div id="scatterChart"></div>

</div>

<!-- OTHER SECTIONS... unchanged -->

</div>
</div>

<script>
const credentials = {
    Administrator: { user: "@admin", pass: "@admin9090" },
    Recruiter: { user: "@Re", pass: "@Re9090" },
    Candidate: { user: "@Ca", pass: "@Ca9090" }
};

const greetings = {
    Administrator: "Welcome Admin! 🌟",
    Recruiter: "Welcome Recruiter! 🤝",
    Candidate: "Welcome Candidate! 🎯"
};

let selectedRole = "";

/* ROLE */
document.querySelectorAll(".roleBtn").forEach(btn=>{
    btn.onclick=()=>{
        selectedRole = btn.dataset.role;
        roleSelection.style.display="none";
        loginPage.style.display="block";
        roleTitle.innerText=selectedRole;
    }
});

/* LOGIN */
function validateLogin(){
    let u = username.value.trim();
    let p = password.value.trim();

    if(u===credentials[selectedRole].user && p===credentials[selectedRole].pass){
        showGreeting();
    } else alert("Invalid login");
}

/* GREETING */
function showGreeting(){
    loginPage.style.display="none";
    greetingMessage.innerText=greetings[selectedRole];
    greetingMessage.classList.add("show");

    setTimeout(()=>{
        greetingMessage.style.display="none";

        if(selectedRole==="Administrator"){
            sidebar.style.display="block";
            adminDashboard.style.display="flex";
            drawScatterChart();
        } else {
            roleSelection.style.display="block";
        }

    },2000);
}

/* NAVIGATION */
function showSection(section){
    document.querySelectorAll("#adminDashboard > div > div").forEach(sec=>{
        sec.style.display="none";
    });
    document.getElementById(section+"Section").style.display="block";
}

/* BACK */
function goBack(){
    adminDashboard.style.display="none";
    sidebar.style.display="none";
    roleSelection.style.display="block";
}

/* DRAW SCATTER WITH LINES */
function drawScatterChart(){
    const chart = document.getElementById("scatterChart");
    chart.innerHTML = "";

    const points = [
        {x:20, y:150},
        {x:80, y:100},
        {x:140, y:130},
        {x:200, y:70},
        {x:260, y:110}
    ];

    // Draw dots
    points.forEach(p=>{
        let dot = document.createElement("div");
        dot.className = "dot";
        dot.style.left = p.x + "px";
        dot.style.top = p.y + "px";
        chart.appendChild(dot);
    });

    // Draw connecting lines
    for(let i=0; i<points.length-1; i++){
        let x1 = points[i].x;
        let y1 = points[i].y;
        let x2 = points[i+1].x;
        let y2 = points[i+1].y;

        let length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        let angle = Math.atan2((y2-y1),(x2-x1)) * 180/Math.PI;

        let line = document.createElement("div");
        line.className = "line";
        line.style.width = length + "px";
        line.style.left = x1 + "px";
        line.style.top = y1 + "px";
        line.style.transform = `rotate(${angle}deg)`;
        chart.appendChild(line);
    }
}
</script>

</body>
</html>
