<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Logo Section -->
    <div class="logo-container">
        <img src="https://via.placeholder.com/200x100.png?text=Logo" alt="Logo" class="logo">
    </div>

    <!-- Options Section -->
    <div class="options-container">
        <div class="option-box" onclick="handleClick('Administrator')">Administrators</div>
        <div class="option-box" onclick="handleClick('Recruiter')">Recruiters</div>
        <div class="option-box" onclick="handleClick('Candidate')">Candidates</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
