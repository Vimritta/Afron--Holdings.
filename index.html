<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizontal Timeline</title>

<style>
/* Modern Clean Horizontal Timeline */
body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 40px;
}

.timelineContainer {
    width: 100%;
    padding: 30px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    margin-top: 30px;
}

/* Line behind the circles */
.timelineLine {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    height: 4px;
    background: #dcdcdc;
    z-index: 1;
}

/* Each timeline step */
.timelineStep {
    text-align: center;
    width: 130px;
    z-index: 2;
}

/* Circle */
.timelineCircle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: lightgray;
    border: 3px solid gray;
    margin: 0 auto;
}

/* Completed Step */
.timelineStep.completed .timelineCircle {
    background: #28a745;
    border-color: #28a745;
}

/* Title */
.timelineStep p {
    margin-top: 10px;
    font-size: 14px;
    font-weight: bold;
}

/* Date */
.timelineStep small {
    font-size: 12px;
    color: #555;
}
</style>

</head>
<body>

<h2>Candidate Progress Timeline</h2>

<div class="timelineContainer">

    <div class="timelineLine"></div>

    <div class="timelineStep completed">
        <div class="timelineCircle"></div>
        <p>Registration<br><small>01 Mar 2026</small></p>
    </div>

    <div class="timelineStep completed">
        <div class="timelineCircle"></div>
        <p>Profile Completed<br><small>02 Mar 2026</small></p>
    </div>

    <div class="timelineStep completed">
        <div class="timelineCircle"></div>
        <p>Test Completed<br><small>05 Mar 2026</small></p>
    </div>

    <div class="timelineStep completed">
        <div class="timelineCircle"></div>
        <p>Interview Scheduled<br><small>07 Mar 2026</small></p>
    </div>

    <div class="timelineStep completed">
        <div class="timelineCircle"></div>
        <p>Interview Completed<br><small>09 Mar 2026</small></p>
    </div>

    <div class="timelineStep">
        <div class="timelineCircle"></div>
        <p>Decision Pending</p>
    </div>

</div>

</body>
</html>
