<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smooth Login UI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eaffea;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

/* Logo */
#logo {
    width: 200px;
    margin-bottom: 25px;
}

/* Role Buttons */
.roleBtn {
    width: 320px;
    padding: 18px;
    font-size: 24px;
    background: #d4edda;
    border: 2px solid #155724;
    border-radius: 12px;
    margin: 10px;
    cursor: pointer;
    text-align: center;
    transition: 0.3s;
}
.roleBtn:hover {
    background: #bfeccb;
    transform: scale(1.05);
}

/* Login Popup */
#loginPopup {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 300px;
    background: white;
    padding: 25px;
    border-radius: 15px;
    transform: translate(-50%, -50%) scale(0.7);
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 0 20px rgba(0,0,0,0.25);
    transition: 0.5s;
}
#loginPopup.show {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 2px solid #155724;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 14px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
}
button:hover {
    background: #0a7a0a;
}

#alertBox {
    color: red;
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<img id="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Teamwork_icon.svg">

<div class="roleBtn" data-role="Administrator">Administrators</div>
<div class="roleBtn" data-role="Recruiter">Recruiters</div>
<div class="roleBtn" data-role="Candidate">Candidates</div>

<!-- Login Popup -->
<div id="loginPopup">
    <h3 id="popupTitle"></h3>
    <input id="username" placeholder="Enter Username">
    <input id="password" type="password" placeholder="Enter Password">
    <button onclick="checkLogin()">Login</button>
    <div id="alertBox"></div>
</div>

<script>
const users = {
    Administrator: { u:"@admin", p:"@admin9090" },
    Recruiter: { u:"@Re", p:"@Re9090" },
    Candidate: { u:"@Ca", p:"@Ca9090" }
};

let selected = "";

// Show popup
document.querySelectorAll(".roleBtn").forEach(btn => {
    btn.onclick = () => {
        selected = btn.dataset.role;
        document.getElementById("popupTitle").textContent = selected + " Login";
        document.getElementById("loginPopup").classList.add("show");
    };
});

// Validate
function checkLogin() {
    let u = username.value.trim();
    let p = password.value.trim();

    if (u === users[selected].u && p === users[selected].p) {
        alert("Login Successful: " + selected);
        document.getElementById("loginPopup").classList.remove("show");
    } 
    else {
        alertBox.textContent = "Invalid username or password!";
    }
}
</script>

</body>
</html>
