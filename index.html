<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Role Selection</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
    }

    h1 {
        margin-top: 40px;
    }

    .container {
        margin-top: 30px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        margin: 10px;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background-color: #007bff;
        color: white;
        transition: 0.3s;
    }

    button:hover {
        background-color: #0056b3;
    }

    /* Login box */
    #loginBox {
        display: none;
        margin-top: 40px;
    }

    input {
        width: 250px;
        padding: 12px;
        margin: 10px;
        border: 1px solid #aaa;
        border-radius: 5px;
        font-size: 16px;
    }

    #nextBtn {
        background-color: #28a745;
    }

    /* greeting box (top-right) */
    #greetingBox {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #ffffff;
        padding: 15px 25px;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
        display: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
</style>

</head>
<body>

<h1>Select Your Role</h1>

<div class="container" id="roleSelection">
    <button onclick="selectRole('Administrator')">Administrators</button>
    <button onclick="selectRole('Recruiter')">Recruiters</button>
    <button onclick="selectRole('Candidate')">Candidates</button>
</div>

<!-- LOGIN PAGE -->
<div id="loginBox">
    <h2 id="loginTitle"></h2>

    <input type="text" id="username" placeholder="Enter Username"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>

    <button id="nextBtn" onclick="login()">Next →</button>
</div>

<!-- GREETING BOX -->
<div id="greetingBox"></div>

<script>
    let selectedRole = "";

    function selectRole(role) {
        selectedRole = role;

        // Hide selection & show login
        document.getElementById("roleSelection").style.display = "none";
        document.getElementById("loginBox").style.display = "block";

        document.getElementById("loginTitle").innerText = role + " Login Portal";
    }

    function login() {
        const user = document.getElementById("username").value.trim();

        const greeting = user
            ? `Welcome back, ${user}! You are logged in as ${selectedRole}.`
            : `Welcome back, ${selectedRole}!`;

        // Display greeting
        const box = document.getElementById("greetingBox");
        box.innerText = greeting;
        box.style.display = "block";

        // Speak aloud
        const msg = new SpeechSynthesisUtterance(greeting);
        msg.rate = 1;
        msg.pitch = 1;
        speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
