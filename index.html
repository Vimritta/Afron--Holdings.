<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Login System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2fff2;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Center Card */
.centerBox {
    background-color: #d4edda;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    width: 320px;
    text-align: center;
}

.roleBtn {
    margin: 12px 0;
    padding: 15px;
    font-size: 22px;
    background: #c3e6cb;
    border: 2px solid #155724;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}
.roleBtn:hover {
    background: #b2dfbb;
    transform: scale(1.05);
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #155724;
    margin-bottom: 15px;
}

button {
    padding: 12px 25px;
    background: green;
    color: white;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}
button:hover {
    background: #0d7a0d;
}

/* Greeting Message */
#greetingMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 80%;
    transform: translate(-50%, -50%) scale(0.9);
    opacity: 0;
    background: white;
    padding: 30px;
    border-radius: 15px;
    font-size: 22px;
    text-align: center;
    transition: 0.7s;
}
#greetingMessage.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<!-- ROLE SELECTION -->
<div id="roleSelection" class="centerBox">
    <h2>Select Your Role</h2>
    <div class="roleBtn" data-role="Administrator">Administrators</div>
    <div class="roleBtn" data-role="Recruiter">Recruiters</div>
    <div class="roleBtn" data-role="Candidate">Candidates</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="centerBox" style="display:none;">
    <h2 id="roleTitle"></h2>
    <input id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="validateLogin()">Login</button>
</div>

<!-- GREETING -->
<div id="greetingMessage"></div>

<script>
const credentials = {
    Administrator: { user: "@admin", pass: "@admin9090" },
    Recruiter: { user: "@Re", pass: "@Re9090" },
    Candidate: { user: "@Ca", pass: "@Ca9090" }
};

const greetings = {
    Administrator: "Welcome mighty Administrator! 🌟",
    Recruiter: "Hello Recruiter! Let's find great talents! 🤝",
    Candidate: "Hi Candidate! Your dream job awaits! 🎯"
};

let selectedRole = "";

// Step 1 — Pick Role
document.querySelectorAll(".roleBtn").forEach(btn => {
    btn.onclick = () => {
        selectedRole = btn.dataset.role;
        document.getElementById("roleSelection").style.display = "none";
        document.getElementById("loginPage").style.display = "block";
        document.getElementById("roleTitle").textContent = selectedRole + " Login";
    };
});

// Step 2 — Validate Login
function validateLogin() {
    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value.trim();

    if (u === credentials[selectedRole].user && p === credentials[selectedRole].pass) {
        showGreeting();
    } else {
        alert("Invalid username or password");
    }
}

// Function to remove emojis before speech
function removeEmojis(text) {
    return text.replace(/[\p{Emoji}\p{Extended_Pictographic}]/gu, "");
}

// Step 3 — Greeting
function showGreeting() {
    document.getElementById("loginPage").style.display = "none";

    let box = document.getElementById("greetingMessage");
    let message = greetings[selectedRole];
    box.textContent = message;
    box.classList.add("show");

    // REMOVE EMOJI from speech
    let speakText = removeEmojis(message);

    let speak = new SpeechSynthesisUtterance(speakText);
    window.speechSynthesis.speak(speak);
}
</script>

</body>
</html>
