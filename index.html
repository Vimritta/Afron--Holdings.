<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Portal with Greetings</title>
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        background-color: #f0f4f0;
        flex-direction: column;
    }

    /* Logo */
    #logo {
        max-width: 80%;
        max-height: 80%;
        transition: opacity 1s ease, transform 1s ease;
    }

    .fadeOut {
        opacity: 0;
        transform: scale(0.7);
    }

    /* Login portal */
    #loginPortal {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 40px;
        background-color: #d4edda; /* pastel green */
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* Buttons */
    .loginBtn {
        width: 260px;
        padding: 18px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        color: #155724; /* dark green */
        background-color: #c3e6cb; /* lighter pastel green */
        border: 2px solid #155724;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s, background-color 0.3s;
    }

    .loginBtn:hover {
        transform: scale(1.05);
        background-color: #b2dfbb;
    }

    /* Greeting */
    #greeting {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
        color: #155724;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.8s ease, transform 0.8s ease;
        text-align: center;
        min-height: 50px; /* reserve space */
    }

    #greeting.show {
        opacity: 1;
        transform: translateY(0);
    }
</style>
</head>
<body>

<!-- Logo -->
<img id="logo" src="https://your-logo-image.png" alt="Logo">

<!-- Login Portal -->
<div id="loginPortal">
    <div class="loginBtn" data-role="Administrator">Administrators</div>
    <div class="loginBtn" data-role="Recruiter">Recruiters</div>
    <div class="loginBtn" data-role="Candidate">Candidates</div>
    <div id="greeting"></div>
</div>

<script>
    // Logo animation
    setTimeout(() => {
        const logo = document.getElementById('logo');
        logo.classList.add('fadeOut');
        logo.addEventListener('transitionend', () => {
            logo.style.display = 'none';
            document.getElementById('loginPortal').style.display = 'flex';
        });
    }, 2000);

    // Greetings
    const greetings = {
        Administrator: "Welcome, mighty Administrator! 🌟 You have full control over the system. Manage your team wisely.",
        Recruiter: "Hello Recruiter! 🤝 Ready to find the perfect candidates? Let’s make great hires today!",
        Candidate: "Hi Candidate! 🎯 Your dream job awaits. Explore opportunities and shine!"
    };

    const buttons = document.querySelectorAll('.loginBtn');
    const greetingEl = document.getElementById('greeting');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            const role = btn.getAttribute('data-role');

            // Remove show class to reset animation
            greetingEl.classList.remove('show');

            // Short delay to retrigger animation
            setTimeout(() => {
                greetingEl.textContent = greetings[role];
                greetingEl.classList.add('show');

                // Automatically hide greeting after 3 seconds
                setTimeout(() => {
                    greetingEl.classList.remove('show');
                }, 3000);
            }, 50);
        });
    });
</script>

</body>
</html>
