<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Based Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

/* ROLE SELECTION */
.roleSelect{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:30px;
}

.roleBtn{
    padding:20px 40px;
    font-size:20px;
    background:#0d1b2a;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#0d1b2a;
    color:white;
    height:100vh;
    padding-top:20px;
    position:fixed;
    display:none;
}

.sidebar h2{
    text-align:center;
}

.sidebar a{
    display:block;
    padding:15px;
    color:white;
    cursor:pointer;
}

.sidebar a:hover{
    background:#1b263b;
}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
    display:none;
}

.section{
    display:none;
}

.chart-container{
    width:600px;
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- ROLE SELECT -->
<div id="rolePage" class="roleSelect">
    <button class="roleBtn" onclick="loadDashboard('admin')">Admin</button>
    <button class="roleBtn" onclick="loadDashboard('recruiter')">Recruiter</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2 id="roleTitle"></h2>
    <div id="menuItems"></div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">

    <!-- ADMIN SECTIONS -->
    <div id="adminSections">
        <div id="analytics" class="section">
            <h1>Admin Analytics</h1>
            <div class="chart-container"><canvas id="scatterChart"></canvas></div>
        </div>

        <div id="userManagement" class="section">
            <h1>User Management</h1>
            <div class="chart-container"><canvas id="userBarChart"></canvas></div>
        </div>

        <div id="jobPosting" class="section">
            <h1>Job Posting</h1>
            <div class="chart-container"><canvas id="jobPieChart"></canvas></div>
        </div>

        <div id="interviews" class="section">
            <h1>Interviews</h1>
            <div class="chart-container"><canvas id="interviewLineChart"></canvas></div>
        </div>

        <div id="messaging" class="section">
            <h1>Messaging</h1>
            <div class="chart-container"><canvas id="messageRadarChart"></canvas></div>
        </div>

        <div id="performance" class="section">
            <h1>Performance</h1>
            <div class="chart-container"><canvas id="performanceDoughnutChart"></canvas></div>
        </div>
    </div>

    <!-- RECRUITER SECTIONS -->
    <div id="recruiterSections">
        <div id="recDashboard" class="section">
            <h1>Recruiter Dashboard</h1>
            <div class="chart-container"><canvas id="recChart"></canvas></div>
        </div>

        <div id="recJobs" class="section">
            <h1>Manage Jobs</h1>
            <p>Create / Edit / Close Jobs</p>
        </div>

        <div id="recCandidates" class="section">
            <h1>Candidates</h1>
            <p>View Applicants & Status</p>
        </div>

        <div id="recInterviews" class="section">
            <h1>Interview Schedule</h1>
        </div>

        <div id="recPerformance" class="section">
            <h1>Your Performance</h1>
        </div>
    </div>

</div>

<script>

/* LOAD DASHBOARD BASED ON ROLE */
function loadDashboard(role){
    document.getElementById("rolePage").style.display="none";
    document.getElementById("sidebar").style.display="block";
    document.getElementById("mainContent").style.display="block";

    let menu = document.getElementById("menuItems");

    if(role === "admin"){
        roleTitle.innerText="Admin Panel";

        menu.innerHTML = `
            <a onclick="showSection('analytics')">Analytics</a>
            <a onclick="showSection('userManagement')">User Management</a>
            <a onclick="showSection('jobPosting')">Job Posting</a>
            <a onclick="showSection('interviews')">Interviews</a>
            <a onclick="showSection('messaging')">Messaging</a>
            <a onclick="showSection('performance')">Performance</a>
            <a onclick="goBack()">⬅ Logout</a>
        `;

        document.getElementById("adminSections").style.display="block";
        document.getElementById("recruiterSections").style.display="none";

        showSection('analytics');

    } else {
        roleTitle.innerText="Recruiter Panel";

        menu.innerHTML = `
            <a onclick="showSection('recDashboard')">Dashboard</a>
            <a onclick="showSection('recJobs')">Jobs</a>
            <a onclick="showSection('recCandidates')">Candidates</a>
            <a onclick="showSection('recInterviews')">Interviews</a>
            <a onclick="showSection('recPerformance')">Performance</a>
            <a onclick="goBack()">⬅ Logout</a>
        `;

        document.getElementById("adminSections").style.display="none";
        document.getElementById("recruiterSections").style.display="block";

        showSection('recDashboard');
    }
}

/* SECTION SWITCH */
function showSection(id){
    document.querySelectorAll(".section").forEach(sec=>{
        sec.style.display="none";
    });
    document.getElementById(id).style.display="block";
}

/* BACK */
function goBack(){
    location.reload();
}

/* CHARTS (SAME AS YOUR STYLE) */
new Chart(document.getElementById('scatterChart'), {
    type: 'scatter',
    data: { datasets: [{ data:[{x:1,y:40},{x:2,y:60},{x:3,y:80}]}] }
});

new Chart(document.getElementById('userBarChart'), {
    type:'bar',
    data:{ labels:["Jan","Feb","Mar"], datasets:[{data:[100,200,300]}] }
});

new Chart(document.getElementById('jobPieChart'), {
    type:'pie',
    data:{ labels:["IT","HR"], datasets:[{data:[60,40]}] }
});

new Chart(document.getElementById('interviewLineChart'), {
    type:'line',
    data:{ labels:["Mon","Tue"], datasets:[{data:[5,10]}] }
});

new Chart(document.getElementById('messageRadarChart'), {
    type:'radar',
    data:{ labels:["A","B","C"], datasets:[{data:[10,20,30]}] }
});

new Chart(document.getElementById('performanceDoughnutChart'), {
    type:'doughnut',
    data:{ labels:["Done","Pending"], datasets:[{data:[70,30]}] }
});

new Chart(document.getElementById('recChart'), {
    type:'bar',
    data:{ labels:["Applied","Shortlisted"], datasets:[{data:[50,20]}] }
});

</script>

</body>
</html>
